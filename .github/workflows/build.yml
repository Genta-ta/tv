name: Build All Arch

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: aarch64
            cc: aarch64-linux-gnu-gcc
            rust_target: aarch64-unknown-linux-musl
            pkg: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            llama_file: llama-b9101-bin-ubuntu-arm64.zip

          - arch: armv7
            cc: arm-linux-gnueabihf-gcc
            rust_target: armv7-unknown-linux-musleabihf
            pkg: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
            llama_file: llama-b9101-bin-ubuntu-armhf.zip

          - arch: x86_64
            cc: gcc
            rust_target: x86_64-unknown-linux-musl
            pkg: musl-tools
            llama_file: llama-b9101-bin-ubuntu-x64.zip

    steps:
    - uses: actions/checkout@v4

    - name: Cache apt
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: apt-${{ matrix.arch }}

    - name: Install toolchain
      run: |
        sudo apt update -qq
        sudo apt install -y ${{ matrix.pkg }} musl-tools unzip

    - name: Cache llama binary
      uses: actions/cache@v4
      with:
        path: llama-bin/
        key: llama-b9101-${{ matrix.arch }}

    - name: Download llama.cpp b9101
      run: |
        mkdir -p bin llama-bin

        if [ -f "llama-bin/llama-cli" ]; then
          echo "Cache hit — skip download"
          cp llama-bin/llama-cli bin/llama-cli
        else
          URL="https://github.com/ggml-org/llama.cpp/releases/download/b9101/${{ matrix.llama_file }}"
          echo "Download: $URL"
          curl -fsSL "$URL" -o llama.zip

          # Extract
          unzip -jo llama.zip "*/llama-cli" -d bin/ 2>/dev/null || \
          unzip -jo llama.zip "*/main"      -d bin/ 2>/dev/null && \
            mv bin/main bin/llama-cli 2>/dev/null || true

          chmod +x bin/llama-cli
          cp bin/llama-cli llama-bin/llama-cli
        fi

        file bin/llama-cli

    - name: Cache Rust
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: rust-${{ matrix.arch }}-${{ hashFiles('Cargo.toml','src/search/main.rs') }}
        restore-keys: rust-${{ matrix.arch }}-

    - name: Install Rust target
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.rust_target }}

    - name: Configure Rust linker
      run: |
        mkdir -p ~/.cargo
        cat >> ~/.cargo/config.toml << TOML
        [target.${{ matrix.rust_target }}]
        linker = "${{ matrix.cc }}"
        rustflags = ["-C", "target-feature=+crt-static"]
        TOML

    - name: Build C server
      run: |
        ${{ matrix.cc }} -O3 -static \
          -o bin/ai-server src/server/main.c \
          -lpthread

    - name: Build Rust search
      run: |
        cargo build --release --target ${{ matrix.rust_target }}
        cp target/${{ matrix.rust_target }}/release/search bin/search

    - name: Verify
      run: |
        ls -lh bin/
        file bin/*

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ai-${{ matrix.arch }}-binaries
        path: bin/
        retention-days: 7
