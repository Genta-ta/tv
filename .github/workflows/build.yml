name: Build All Arch

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: aarch64
            cc: aarch64-linux-gnu-gcc
            rust_target: aarch64-unknown-linux-musl
            pkg: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            llama_arch: arm64

          - arch: armv7
            cc: arm-linux-gnueabihf-gcc
            rust_target: armv7-unknown-linux-musleabihf
            pkg: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
            llama_arch: armv7l

          - arch: x86_64
            cc: gcc
            rust_target: x86_64-unknown-linux-musl
            pkg: musl-tools
            llama_arch: x64

    steps:
    - uses: actions/checkout@v4

    - name: Cache apt
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: apt-${{ matrix.arch }}

    - name: Install toolchain
      run: |
        sudo apt update -qq
        sudo apt install -y ${{ matrix.pkg }} musl-tools

    - name: Download llama.cpp pre-built
      run: |
        mkdir -p bin

        # Ambil versi release terbaru
        LLAMA_VER=$(curl -s \
          https://api.github.com/repos/ggerganov/llama.cpp/releases/latest \
          | grep tag_name | cut -d'"' -f4)
        echo "llama.cpp version: $LLAMA_VER"

        # Map arch ke nama file release llama.cpp
        case "${{ matrix.arch }}" in
          aarch64)
            FILE="llama-${LLAMA_VER}-bin-ubuntu-arm64.zip" ;;
          armv7)
            FILE="llama-${LLAMA_VER}-bin-ubuntu-armhf.zip" ;;
          x86_64)
            FILE="llama-${LLAMA_VER}-bin-ubuntu-x64.zip" ;;
        esac

        URL="https://github.com/ggerganov/llama.cpp/releases/download/${LLAMA_VER}/${FILE}"
        echo "Downloading: $URL"

        curl -fsSL "$URL" -o llama.zip || {
          echo "File tidak ada, coba format lain..."
          # Fallback format lama
          case "${{ matrix.arch }}" in
            aarch64) FILE="llama-${LLAMA_VER}-bin-linux-arm64.zip" ;;
            armv7)   FILE="llama-${LLAMA_VER}-bin-linux-armhf.zip" ;;
            x86_64)  FILE="llama-${LLAMA_VER}-bin-linux-x64.zip"   ;;
          esac
          URL="https://github.com/ggerganov/llama.cpp/releases/download/${LLAMA_VER}/${FILE}"
          curl -fsSL "$URL" -o llama.zip
        }

        # Extract llama-cli saja
        unzip -jo llama.zip "*/llama-cli" -d bin/ || \
        unzip -jo llama.zip "*/main" -d bin/ && mv bin/main bin/llama-cli
        chmod +x bin/llama-cli
        file bin/llama-cli

    - name: Cache Rust
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: rust-${{ matrix.arch }}-${{ hashFiles('Cargo.toml','src/search/main.rs') }}
        restore-keys: rust-${{ matrix.arch }}-

    - name: Install Rust target
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.rust_target }}

    - name: Configure Rust linker
      run: |
        mkdir -p ~/.cargo
        cat >> ~/.cargo/config.toml << TOML
        [target.${{ matrix.rust_target }}]
        linker = "${{ matrix.cc }}"
        rustflags = ["-C", "target-feature=+crt-static"]
        TOML

    - name: Build C server
      run: |
        ${{ matrix.cc }} -O3 -static \
          -o bin/ai-server src/server/main.c \
          -lpthread

    - name: Build Rust search
      run: |
        cargo build --release --target ${{ matrix.rust_target }}
        cp target/${{ matrix.rust_target }}/release/search bin/search

    - name: Verify semua binary
      run: |
        ls -lh bin/
        file bin/*

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ai-${{ matrix.arch }}-binaries
        path: bin/
        retention-days: 7
