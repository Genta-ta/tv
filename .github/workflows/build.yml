name: Build ARM64

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install ARM64 toolchain
      run: |
        sudo apt update
        sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

    - name: Build C server
      run: |
        mkdir -p bin
        aarch64-linux-gnu-gcc -O3 -march=armv8-a+simd \
          -static -o bin/ai-server src/server/main.c -lpthread

    - name: Install Rust ARM64 target
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-unknown-linux-gnu

    - name: Configure Rust linker
      run: |
        mkdir -p ~/.cargo
        cat >> ~/.cargo/config.toml << 'TOML'
        [target.aarch64-unknown-linux-gnu]
        linker = "aarch64-linux-gnu-gcc"
        TOML

    - name: Build Rust search
      run: |
        cargo build --release --target aarch64-unknown-linux-gnu
        cp target/aarch64-unknown-linux-gnu/release/search bin/search

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: ai-arm64-binaries
        path: bin/
        retention-days: 7
