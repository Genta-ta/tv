name: Build All Arch

on:
  push:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: aarch64
            cc: aarch64-linux-gnu-gcc
            rust_target: aarch64-unknown-linux-musl
            pkg: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            llama_file: llama-b9101-bin-ubuntu-arm64.tar.gz

          - arch: x86_64
            cc: gcc
            rust_target: x86_64-unknown-linux-musl
            pkg: musl-tools
            llama_file: llama-b9101-bin-ubuntu-x64.tar.gz

    steps:
    - uses: actions/checkout@v4

    # 1. Cache untuk package APT (toolchain)
    - name: Cache apt
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: apt-${{ matrix.arch }}-${{ hashFiles('.github/workflows/*.yml') }}
        restore-keys: apt-${{ matrix.arch }}-

    - name: Install toolchain
      run: |
        sudo apt update -qq
        sudo apt install -y ${{ matrix.pkg }} musl-tools

    # 2. Cache untuk Rust (Cargo & Target)
    # Ini yang paling penting supaya compile Rust gak makan waktu 10 menit tiap push
    - name: Cache Rust
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        # Menggunakan Cargo.toml sebagai kunci, jika tidak ada perubahan dependency, cache dipakai
        key: rust-${{ matrix.arch }}-${{ hashFiles('**/Cargo.toml') }}
        restore-keys: |
          rust-${{ matrix.arch }}-

    - name: Download llama.cpp b9101
      run: |
        mkdir -p bin llama-bin /tmp/llama-extract
        if [ -f "llama-bin/llama-cli" ]; then
          cp llama-bin/llama-cli bin/llama-cli
        else
          URL="https://github.com/ggml-org/llama.cpp/releases/download/b9101/${{ matrix.llama_file }}"
          curl -fsSL "$URL" -o /tmp/llama.tar.gz
          tar -xzf /tmp/llama.tar.gz -C /tmp/llama-extract
          BINARY=$(find /tmp/llama-extract -type f -name "llama-cli" | head -1)
          [ -z "$BINARY" ] && BINARY=$(find /tmp/llama-extract -type f -executable | head -1)
          cp "$BINARY" bin/llama-cli
          chmod +x bin/llama-cli
          cp bin/llama-cli llama-bin/llama-cli
        fi

    - name: Install Rust target
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.rust_target }}

    - name: Configure Rust linker
      run: |
        mkdir -p ~/.cargo
        cat > ~/.cargo/config.toml << TOML
        [target.${{ matrix.rust_target }}]
        linker = "${{ matrix.cc }}"
        rustflags = ["-C", "target-feature=+crt-static"]
        TOML

    - name: Build C server
      run: |
        mkdir -p bin
        ${{ matrix.cc }} -O3 -static -o bin/ai-server src/server/main.c -lpthread

    - name: Build Rust search
      run: |
        cargo build --release --target ${{ matrix.rust_target }}
        cp target/${{ matrix.rust_target }}/release/search bin/search

    - name: Verify
      run: |
        ls -lh bin/
        file bin/*

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ai-${{ matrix.arch }}-binaries
        path: bin/
        retention-days: 7
